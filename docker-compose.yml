version: '3.8'
networks:
  microservice-net:
    driver: bridge
volumes:
  user-db-data:
services:
  # ─── DATABASES ───────────────────────────────────────────────
  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"
    volumes:
      - user-db-data:/var/lib/mysql
    networks:
      - microservice-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - microservice-net
  #SERVICE
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservice-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8761/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8080"
    environment:
      DB_HOST: user-db
      DB_NAME: user_db
      DB_USER: root
      DB_PASS: root
      EUREKA_URL: http://eureka-server:8761/eureka
      JWT_SECRET: mySecretKey12345678901234567890123456789012
    depends_on:
      user-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - microservice-net

  # ─── GATEWAY ─────────────────────────────────────────────────
  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      JWT_SECRET: mySecretKey12345678901234567890123456789012
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservice-net
