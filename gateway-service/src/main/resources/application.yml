spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          discovery:
            enabled: true
            lower-case-service-id: true
          routes:
            # Auth
            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**
              filters:
                - name: LoggingFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@ipKeyResolver}"

            # User Service
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - name: JwtAuthFilter
                - name: LoggingFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"

            # Product Service
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
              filters:
                - name: JwtAuthFilter
                - name: LoggingFilter

            # Order Service
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
              filters:
                - name: JwtAuthFilter
                - name: LoggingFilter

            # Swagger docs routes
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/user-service/v3/api-docs/**
              filters:
                - RewritePath=/user-service/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

            - id: product-service-docs
              uri: lb://product-service
              predicates:
                - Path=/product-service/v3/api-docs/**
              filters:
                - RewritePath=/product-service/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

            - id: order-service-docs
              uri: lb://order-service
              predicates:
                - Path=/order-service/v3/api-docs/**
              filters:
                - RewritePath=/order-service/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:5ZVnyGvacZRrCczj+xnOJxKQlR1xIxeb52erVLM169U=}
  expiration: 900000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.demo: INFO
    org.springframework.cloud.gateway: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs