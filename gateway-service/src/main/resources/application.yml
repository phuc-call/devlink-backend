spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
  cloud:
    config:
      enabled: false
    gateway:
      server:
        webflux:
          discovery:
            enabled: true
            lower-case-service-id: true
          routes:
            - id: user-service-oauth2
              uri: lb://user-service
              predicates:
               - Path=/oauth2/**,/login/oauth2/**
              filters:
               - name: LoggingFilter

            - id: user-service-auth-public
              uri: lb://user-service
              predicates:
                - Path=/auth/register/**,/auth/login,/auth/refresh
              filters:
                - name: LoggingFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@ipKeyResolver}"

            - id: user-service-auth-private
              uri: lb://user-service
              predicates:
                - Path=/api/auth/logout
                - Path=/api/auth/logout/all
              filters:
                - name: JwtAuthFilter
                - name: LoggingFilter

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - name: JwtAuthFilter
                - name: LoggingFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"

            # x
            - id: x
              uri: lb://x
              predicates:
                - Path=/api/x/**
              filters:
                - name: JwtAuthFilter
                - name: LoggingFilter

            # x
            - id: x
              uri: lb://x
              predicates:
                - Path=/api/x/**
              filters:
                - name: JwtAuthFilter
                - name: LoggingFilter

            # Swagger docs routes
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/user-service/v3/api-docs/**
              filters:
                - RewritePath=/user-service/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

            - id: x-service-docs
              uri: lb://x-service
              predicates:
                - Path=/x-service/v3/api-docs/**
              filters:
                - RewritePath=/x-service/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

            - id: x-service-docs
              uri: lb://x-service
              predicates:
                - Path=/x-service/v3/api-docs/**
              filters:
                - RewritePath=/x-service/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
      register-fetch-interval-seconds: 5
      fetch-registry: true
      register-with-eureka: true
  instance:
    prefer-ip-address: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:5ZVnyGvacZRrCczj+xnOJxKQlR1xIxeb52erVLM169U=}
  expiration: 900000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.demo: INFO
    org.springframework.cloud.gateway: TRACE
    reactor.netty: DEBUG

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs

