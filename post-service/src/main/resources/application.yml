spring:
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 500MB
  application:
    name: post-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:post_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        time_zone: UTC
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    sql-migration-suffixes: .sql
    mixed: true

  kafka:
    topics:
      media-cleanup: media-cleanup
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      compression-type: lz4
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        delivery.timeout.ms: 120000
        retry.backoff.ms: 1000
        linger.ms: 5
        batch.size: 32768
        spring.json.add.type.headers: true
        spring.json.type.mapping: >-
          report:com.devlink.post_service.dto.event.ReportCreatedEvent,
          reportReviewed:com.devlink.post_service.dto.event.ReportReviewedEvent,
          mediaCleanup:com.devlink.post_service.dto.event.MediaCleanupEvent,
          reactions:com.devlink.post_service.dto.event.ReactionCreatedEvent,
          comment:com.devlink.post_service.dto.event.CommentCreatedEvent
    consumer:
      group-id: media-cleanup-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
        spring.json.type.mapping: >-
          mediaCleanup:com.devlink.post_service.dto.event.MediaCleanupEvent,
          userProfileUpdated:com.devlink.post_service.dto.event.UserProfileEvent

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.devlink: DEBUG
    org.springframework.web: DEBUG


springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false
gemini:
  api:
    key: AIzaSyAQuAvLi9u-JdRbfMFpq7jT7UKEwvv_d5Q
    model: "gemini-2.0-flash"


openai:
  api:
    key: ${OPENAI_API_KEY}
    url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    max-tokens: 1024
    timeout-ms: 30000

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException
      user-service-feed-info:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

  retry:
    instances:
      user-service:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - feign.FeignException.ServiceUnavailable
        ignore-exceptions:
          - feign.FeignException.BadRequest
          - feign.FeignException.Unauthorized
          - feign.FeignException.Forbidden
          - feign.FeignException.NotFound
      user-service-feed-info:
        max-attempts: 3
        wait-duration: 500ms
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_USER:devlink_admin}
  secret-key: ${MINIO_PASSWORD:devlink_secret_123}
  bucket: ${MINIO_BUCKET:devlink-media}

internal:
  secret: ${INTERNAL_SECRET}

# File-size based classification (bytes). Admin can tune these via env override.
# Short video: 0 B  – short-max-bytes   (default ≤ 50 MB)
# Long  video: long-min-bytes – long-max-bytes (default > 50 MB, admin-set upper limit)
video:
  feed:
    short-max-bytes: ${VIDEO_SHORT_MAX_BYTES:52428800}
    long-min-bytes:  ${VIDEO_LONG_MIN_BYTES:52428800}
    long-max-bytes:  ${VIDEO_LONG_MAX_BYTES:10737418240}
    discovery-ratio: ${VIDEO_DISCOVERY_RATIO:0.20}