spring:
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}   # email gmail của bạn
    password: ${MAIL_PASSWORD}   # App Password 16 ký tự
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  kafka:
    listener:
      missing-topics-fatal: false
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      compression-type: lz4
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        delivery.timeout.ms: 120000
        retry.backoff.ms: 1000
        linger.ms: 5
        batch.size: 32768
        spring.json.add.type.headers: true
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
        spring.json.type.mapping: >-                                      
          report:com.devlink.user_service.dto.event.ReportCreatedEvent,
          reportReviewed:com.devlink.user_service.dto.event.ReportReviewedEvent,
          reactions:com.devlink.user_service.dto.event.ReactionCreatedEvent,
          comment:com.devlink.user_service.dto.event.CommentCreatedEvent
        

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:580676986376-bfptgpk9qceiluber2edf8etjh53skr0.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope: email, profile
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:user_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    sql-migration-suffixes: .sql
    mixed: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
  instance:
    prefer-ip-address: true
jwt:
  secret: ${JWT_SECRET:5ZVnyGvacZRrCczj+xnOJxKQlR1xIxeb52erVLM169U=}
  expiration: 900000

internal:
  secret: ${INTERNAL_SECRET}
resilience4j:
  circuitbreaker:
    instances:
      emailCB:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50        # 50% lỗi → ngắt
        wait-duration-in-open-state: 60s  # chờ 60s rồi thử lại
        permitted-number-of-calls-in-half-open-state: 2
      googleOAuthCB:
        sliding-window-size: 5
        failure-rate-threshold: 40
        wait-duration-in-open-state: 30s

  retry:
    instances:
      emailRetry:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - jakarta.mail.MessagingException
          - java.net.ConnectException
      googleOAuthRetry:
        max-attempts: 2
        wait-duration: 500ms

management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    com.demo: INFO
    com.devlink: DEBUG
    org.springframework.web: DEBUG

app:
  frontend-url: http://localhost:5173
  refresh-token-expiry-days: 30
  default-role-id: 1
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_USER:devlink_admin}
  secret-key: ${MINIO_PASSWORD:devlink_secret_123}
  bucket: ${MINIO_BUCKET:devlink-media}
