spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:580676986376-bfptgpk9qceiluber2edf8etjh53skr0.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope: email, profile
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:user_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8081
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
  instance:
    prefer-ip-address: true
jwt:
  secret: ${JWT_SECRET:5ZVnyGvacZRrCczj+xnOJxKQlR1xIxeb52erVLM169U=}
  expiration: 900000


management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    com.demo: INFO

app:
  frontend-url: http://localhost:3000
  refresh-token-expiry-days: 30
  default-role-id: 1
springdoc:
  api-docs:
    path: /v3/api-docs